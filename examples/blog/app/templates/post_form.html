{% extends "base.html" %}

{% block title %}Add a Post - Blog Posts{% endblock title %}

{% block content %}
    <h2>Create New Post</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit">Publish</button>
    </form>
{% endblock content %}
